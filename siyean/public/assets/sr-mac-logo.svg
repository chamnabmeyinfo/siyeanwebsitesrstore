  </g>

  <text x="110" y="215" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="40" fill="url(#metalDark)" letter-spacing="0.15em">SR MAC</text>
  <text x="110" y="245" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="26" fill="url(#metalDark)" letter-spacing="0.4em">SHOP</text>
