<?xml version="1.0" encoding="UTF-8"?>
<svg width="220" height="260" viewBox="0 0 220 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SR Mac Shop Emblem</title>
  <desc id="desc">Minimal metallic emblem representing SR Mac Shop with a sculpted apple shape and word mark.</desc>
  <defs>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f7fb"/>
      <stop offset="45%" stop-color="#cfd3da"/>
      <stop offset="100%" stop-color="#898d94"/>
    </linearGradient>
    <linearGradient id="metalDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3c4149"/>
      <stop offset="100%" stop-color="#181a1f"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0a0c10" flood-opacity="0.25"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <path d="M145 34c12.5-16.5 26-24 36-24-2.8 13-10 25-21.2 33.4C148 52 133.5 56 124 55c3.6-11.1 11-18.3 21-21z" fill="url(#metal)"/>
